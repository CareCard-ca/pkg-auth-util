name: CI

on:
  push:
    branches:
      - main
      - develop
      - development
      - dev*
      - feature/**
      - feat/**
      - improvement/**
      - releases/**
      - release*
      - hotfix/**
      - iss/**
      - fix/**
      - data**
      - data/**
    paths-ignore:
      - '**.md'
  pull_request:
    types: [closed]
    branches:
      - main
      - develop
      - development
      - dev*
      - feature/**
      - feat/**
      - improvement/**
      - releases/**
      - release*
      - hotfix/**
      - iss/**
      - fix/**
      - data**
      - data/**
    paths-ignore:
      - '**.md'

jobs:
  test:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:All

      - name: Run tests with coverage
        run: npm run test:coverage
