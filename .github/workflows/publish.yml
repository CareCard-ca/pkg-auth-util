name: Publish to npm

on:
  push:
    branches:
      - development
      - main

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Added HUSKY=0 to prevent the husky error in logs
        run: npm ci
        env:
          HUSKY: 0

      - name: Check package version
        id: package-version
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "${package_name}@${package_version} is not published yet."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.package-version.outputs.should_publish == 'true'
        run: npm publish --provenance --access public
        env:
          HUSKY: 0
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
